<!DOCTYPE html>
<html>
  <head>
    <title>Welcome</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" href="stylesheet/index_style.css">
  </head>

  <body class="w3-light-grey">

    <!-- Navbar (sit on top) -->
    <div class="w3-top">
      <div class="w3-bar" id="myNavbar">
        <a class="w3-bar-item w3-button w3-hover-black w3-hide-medium w3-hide-large w3-right" href="javascript:void(0);" onclick="toggleFunction()" title="Toggle Navigation Menu">
          <i class="fa fa-bars"></i>
        </a>
        <a href="#home" class="w3-bar-item w3-button">HOME</a>
        <div class="w3-dropdown-hover" id="hover">
          <button class="w3-button"><i class="fa fa-bars"></i> SECTIONS</a></button>
          <div class="w3-dropdown-content w3-bar-block w3-card-4">
            <a href="#section1" class="w3-bar-item w3-button w3-light-grey">The Binary System</a>
            <a href="#section2" class="w3-bar-item w3-button w3-light-grey">Section 2</a>
            <a href="#section3" class="w3-bar-item w3-button w3-light-grey">Section 3</a>
          </div>
        </div>
        <a href="#about" class="w3-bar-item w3-button w3-hide-small"><i class="fa fa-user"></i> ABOUT</a>
        <a href="#contact" class="w3-bar-item w3-button w3-hide-small"><i class="fa fa-envelope"></i> CONTACT</a>
      </div>
    
      <!-- Navbar on small screens -->
      <div id="navDemo" class="w3-bar-block w3-white w3-hide w3-hide-large w3-hide-medium">
        <a href="#about" class="w3-bar-item w3-button" onclick="toggleFunction()">ABOUT</a>
        <a href="#contact" class="w3-bar-item w3-button" onclick="toggleFunction()">CONTACT</a>
        <div class="w3-dropdown-hover">
          <button class="w3-button"><i class="fa fa-caret-down"></i> SECTIONS</a></button>
          <div class="w3-dropdown-content w3-bar-block w3-card-4">
            <a href="#section1" class="w3-bar-item w3-button w3-light-grey" onclick="toggleFunction()">The Binary System</a>
            <a href="#section2" class="w3-bar-item w3-button w3-light-grey" onclick="toggleFunction()">Section 2</a>
            <a href="#section3" class="w3-bar-item w3-button w3-light-grey" onclick="toggleFunction()">Section 3</a>
          </div>
        </div>
      </div>
    </div>

    <!-- First Parallax Image with Logo Text -->
    <div class="bgimg-1 w3-display-container w3-opacity-min" id="home">
      <div class="w3-display-middle" style="white-space: nowrap">
        <span class="w3-center w3-padding-large w3-black w3-xlarge w3-wide w3-animate-opacity">WELCOME <span class="w3-hide-small">TO MY SITE</span></span>
      </div>
    </div>

    <!-- Container (Section 1) -->
    <div id="section1"></div>

    <!-- Container (Section 2) -->
    <div id="section3"></div>


    <!-- Second Parallax Image with Portfolio Text -->
    <div class="bgimg-2 w3-display-container w3-opacity-min">
      <div class="w3-display-middle">
        <span class="w3-xxlarge w3-text-white w3-wide">ABOUT</span>
      </div>
    </div>

    <!-- Container (About me) -->
    <div id="about"></div>

    <!-- Third Parallax Image with Portfolio Text -->
    <div class="bgimg-3 w3-display-container w3-opacity-min">
      <div class="w3-display-middle">
        <span class="w3-xxlarge w3-text-white w3-wide">CONTACT <span class="w3-hide-small">FORM</span></span>
      </div>
    </div>

    <!-- The Contact Section -->
    <div id="contact"></div>

    <!-- Container (Footer) -->
    <footer id="footer"></footer>

    <script src="js/common.js"></script>
    <script src="js/loadContent.js"></script>
  </body>
</html>
